<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>desafio</title>
  </head>
  <body class="bg-gray-200 p-4">
    <header class="h-full flex flex-col justify-center">
      <h1 class="text-4xl font-bold text-black">Todo list</h1>
    </header>
    <main>
    <div class="flex h-full gap-4">
      <input id="todoInsertName" class="rounded-md bg-white focus:outline-none w-128 border-none" type="text">
      <button type="button" id="todoInsertButton" class="rounded-md border-none bg-green-600 hover:bg-lime-400 focus:outline-none text-white px-4">Agregar</button>
    </div>
    <p class="text-slate-400">Totales: <span id="totalTasks" class="text-black font-bold">0</span> Realizadas: <span id="doneTasks" class="text-black font-bold">0</span></p>
    <table id="taskTable" class="w-2/5">
      <thead>
        <tr>
          <th>ID</th>
          <th>Tarea</th>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
